<style>
:root{--paper:#f7f5ef;--white:#fff;--navy:#17324a;--orange:#d86b38;--ink:#2b3033;--muted:#676b6e;--line:rgba(23,50,74,.16);--error:#a52a2a;--success:#245d45}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;line-height:1.8;-webkit-font-smoothing:antialiased}.wrap{width:min(100% - 32px,920px);margin:auto}a{color:inherit}.header{border-bottom:1px solid var(--line);background:rgba(247,245,239,.94)}.header .wrap{height:68px;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900;color:var(--navy);text-decoration:none}.back{font-size:13px;color:var(--muted)}main{padding:72px 0 100px}.intro{max-width:740px;margin-bottom:42px}.eyebrow{font:700 11px 'JetBrains Mono',monospace;color:var(--orange);letter-spacing:.12em}.intro h1{font-family:'Noto Serif JP',serif;font-size:clamp(34px,6vw,54px);line-height:1.4;color:var(--navy);margin:14px 0 20px}.intro p{font-size:17px;color:var(--muted)}.scope{padding:18px 20px;background:#e7edf0;border-radius:6px;font-size:14px}.form-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:clamp(24px,6vw,52px)}.field{margin-bottom:24px}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}label,.legend{display:block;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:7px}.required{font-size:11px;color:var(--orange);margin-left:5px}.optional{font-size:11px;color:var(--muted);margin-left:5px}.control{display:block;width:100%;min-height:50px;border:1px solid #aeb7bc;border-radius:5px;background:white;color:var(--ink);font:inherit;font-size:16px;padding:11px 13px}.control:focus{outline:3px solid rgba(216,107,56,.25);border-color:var(--orange)}textarea.control{min-height:170px;resize:vertical}.hint{font-size:12px;color:var(--muted);margin:6px 0 0}.consent{display:flex;align-items:flex-start;gap:10px;padding:16px;background:var(--paper);border-radius:5px;margin:28px 0 20px}.consent input{width:20px;height:20px;flex:0 0 auto;margin-top:3px;accent-color:var(--orange)}.consent label{font-weight:500;margin:0}.consent a{text-decoration:underline}.submit{width:100%;min-height:56px;border:0;border-radius:6px;background:var(--orange);color:white;font:700 16px 'Noto Sans JP',sans-serif;cursor:pointer}.submit:hover{background:#bd552a}.submit:focus-visible,a:focus-visible{outline:3px solid #f0a27f;outline-offset:3px}.submit:disabled{opacity:.55;cursor:wait}.status{display:none;margin-top:16px;padding:15px;border-radius:5px;font-size:14px}.status.success{display:block;background:#e5f1ea;color:var(--success)}.status.error{display:block;background:#f7e8e5;color:var(--error)}.hp{position:absolute!important;left:-9999px!important;width:1px!important;height:1px!important;overflow:hidden!important}footer{border-top:1px solid var(--line);padding:28px 0;color:var(--muted);font-size:12px}@media(max-width:640px){main{padding:48px 0 72px}.field-row{grid-template-columns:1fr;gap:0}.intro p{font-size:16px}.form-card{padding:24px 18px}.back{font-size:12px}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}

<body>
<header class="header"><div class="wrap"><a class="brand" href="/story">篠崎友寿</a><a class="back" href="/story">← 個人サイトへ戻る</a></div></header>
<main><div class="wrap"><div class="intro"><span class="eyebrow">CONTACT</span><h1>取材等のご相談・<br>お問い合わせ</h1><p>コワーキング門司港に関する取材や、プロジェクトへの協力・連携のご相談をはじめ、講演、地域活動、教育、店舗経営、AI・IT活用に関するお問い合わせを受け付けています。</p><p class="scope">商品購入、教室体験、MEOサービスのお申込みは、それぞれの専用ページからお願いいたします。</p></div>
<form class="form-card" id="personalContactForm" action="https://formspree.io/f/mdarqkkn" method="POST" novalidate>
<input type="hidden" name="_subject" value="【篠崎友寿 個人サイト】お問い合わせ">
<input type="hidden" name="流入元" id="contactSource" value="個人ブランドサイト /story/contact">
<input type="hidden" name="同意日時" id="consentTime">
<div class="hp" aria-hidden="true"><label for="website">ウェブサイト</label><input id="website" name="_gotcha" type="text" tabindex="-1" autocomplete="off"></div>
<div class="field"><label for="category">お問い合わせ種別<span class="required">必須</span></label><select class="control" id="category" name="お問い合わせ種別" required><option value="">選択してください</option><option>コワーキング門司港への取材・協力</option><option>その他の取材</option><option>講演</option><option>地域・企業・団体との連携</option><option>店舗経営について</option><option>AI・IT活用について</option><option>その他</option></select></div>
<div class="field-row"><div class="field"><label for="name">氏名<span class="required">必須</span></label><input class="control" id="name" name="氏名" type="text" autocomplete="name" required maxlength="100"></div><div class="field"><label for="organization">会社・団体名<span class="optional">任意</span></label><input class="control" id="organization" name="会社・団体名" type="text" autocomplete="organization" maxlength="150"></div></div>
<div class="field"><label for="email">メールアドレス<span class="required">必須</span></label><input class="control" id="email" name="email" type="email" autocomplete="email" inputmode="email" required maxlength="254"></div>
<div class="field"><label for="message">お問い合わせ内容<span class="required">必須</span></label><textarea class="control" id="message" name="お問い合わせ内容" required minlength="10" maxlength="3000" aria-describedby="messageHint"></textarea><p class="hint" id="messageHint">10〜3,000文字でご記入ください。</p></div>
<div class="consent"><input id="consent" type="checkbox" required><label for="consent"><a href="/privacy" target="_blank" rel="noopener">プライバシーポリシー</a>に同意します<span class="required">必須</span></label></div>
<button class="submit" id="submitButton" type="submit">この内容で問い合わせる</button><div class="status" id="formStatus" role="status" aria-live="polite"></div>
</form></div></main>
<footer><div class="wrap">© LAM COMPANY ／ 門司港, 北九州</div></footer>
<script>
(function(){const params=new URLSearchParams(window.location.search);if(params.get('from')!=='coworking')return;const category=document.getElementById('category'),source=document.getElementById('contactSource'),message=document.getElementById('message');if(category)category.value='コワーキング門司港への取材・協力';if(source)source.value='コワーキング門司港ページ';if(message)message.placeholder='取材のご希望や、ご協力いただける内容などをご記入ください。';})();
(function(){const form=document.getElementById('personalContactForm'),button=document.getElementById('submitButton'),status=document.getElementById('formStatus'),consent=document.getElementById('consent'),consentTime=document.getElementById('consentTime');let started=false;function track(name,params){if(typeof gtag==='function')gtag('event',name,params||{})}form.addEventListener('input',()=>{if(!started){started=true;track('personal_contact_form_start')}});form.addEventListener('submit',async event=>{event.preventDefault();status.className='status';status.textContent='';if(!form.checkValidity()){form.reportValidity();status.className='status error';status.textContent='必須項目を確認してください。';track('personal_contact_form_error',{error_type:'validation'});return}consentTime.value=new Date().toISOString();button.disabled=true;button.textContent='送信中…';track('personal_contact_form_submit');try{const response=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{Accept:'application/json'}});if(!response.ok)throw new Error('submit failed');form.reset();started=false;status.className='status success';status.textContent='お問い合わせを受け付けました。内容を確認後、ご連絡します。';track('personal_contact_form_success')}catch(error){status.className='status error';status.textContent='送信できませんでした。時間をおいて、もう一度お試しください。';track('personal_contact_form_error',{error_type:'network'})}finally{button.disabled=false;button.textContent='この内容で問い合わせる'}})})();
</script>
</body>
</html>
